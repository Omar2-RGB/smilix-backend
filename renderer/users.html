<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smilix Users</title>
  <style>
    :root {
      --bg-1: #07121d;
      --bg-2: #0d2233;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.08);
      --text: #eef8ff;
      --muted: #9db6ca;
      --primary: #35a8ff;
      --primary-2: #2ce0c7;
      --danger: #ff7b9c;
      --success: #36d399;
      --warning: #ffb84d;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(53,168,255,0.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(44,224,199,0.10), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      gap: 16px;
      padding: 16px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(53,168,255,0.25), rgba(44,224,199,0.14));
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-title {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      height: 52px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 16px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(53,168,255,0.18), rgba(44,224,199,0.12));
      border-color: rgba(53,168,255,0.22);
      transform: translateY(-1px);
    }

    .sidebar-footer {
      margin-top: auto;
    }

    .logout-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--danger), #ff5f7c);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border: none;
      color: white;
      font-weight: 700;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-input {
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.04);
      color: #dcefff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .action-cell {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }

    .edit-btn { background: #2f86ff; }
    .delete-btn { background: #ff5f7c; }

    .status-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
    }

    .status-active {
      background: rgba(54,211,153,0.16);
      color: #8ff0c0;
    }

    .status-inactive {
      background: rgba(255,123,156,0.16);
      color: #ffb2c4;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 760px;
      background: #102638;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      color: #dcefff;
    }

    .field input,
    .field select {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }

    .modal-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-start;
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    .field select,
select {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  color: white;
  padding: 0 12px;
  outline: none;
  font-size: 14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.field select option,
select option {
  background-color: #102638;
  color: #eef8ff;
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Smilix Logo" />
          </div>
          <div>
            <h1>Smilix</h1>
            <p>منصة إدارة عيادات الأسنان</p>
          </div>
        </div>

        <div class="nav-title">القائمة الرئيسية</div>
        <div class="nav">
        <button id="nav-dashboard" class="nav-btn" onclick="goToDashboard()"><span>لوحة التحكم</span><span>🏠</span></button>
        <button id="nav-patients" class="nav-btn" onclick="goToPatients()"><span>المرضى</span><span>👤</span></button>
        <button id="nav-appointments" class="nav-btn" onclick="goToAppointments()"><span>المواعيد</span><span>📅</span></button>
        <button id="nav-invoices" class="nav-btn" onclick="goToInvoices()"><span>الفواتير</span><span>🧾</span></button>
        <button id="nav-payments" class="nav-btn" onclick="goToPayments()"><span>الدفعات</span><span>💳</span></button>
       <button id="nav-users" class="nav-btn active"><span>المستخدمون</span><span>👨‍💼</span></button>
      </div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="content">
      <section class="topbar">
        <div>
          <h2>المستخدمون</h2>
          <p>إدارة حسابات المستخدمين وصلاحياتهم.</p>
          
        </div>

        <div class="actions">
          <button class="btn primary" onclick="openCreateModal()">+ إضافة مستخدم</button>
            <button class="btn primary" onclick="downloadBackup()">
💾 إنشاء نسخة احتياطية
</button>

<input type="file" id="restoreFile" />
<button class="btn" onclick="restoreBackup()">
♻️ استرجاع نسخة
</button>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <input id="searchInput" class="search-input" type="text" placeholder="ابحث بالاسم أو اسم المستخدم" />
          <button class="btn" onclick="loadUsers()">بحث</button>
        
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>الاسم الكامل</th>
                <th>اسم المستخدم</th>
                <th>الدور</th>
                <th>الحالة</th>
                <th>تاريخ الإنشاء</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty" style="display:none;">لا يوجد مستخدمون بعد.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="userModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">إضافة مستخدم</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
        
      </div>

      <div class="form-grid">
        <div class="field">
          <label>الاسم الكامل</label>
          <input id="fullName" type="text" />
        </div>

        <div class="field">
          <label>اسم المستخدم</label>
          <input id="username" type="text" />
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input id="password" type="password" />
        </div>

        <div class="field">
          <label>الدور</label>
          <select id="roleId"></select>
        </div>

        <div class="field full">
          <label>الحالة</label>
          <select id="isActive">
            <option value="true">فعال</option>
            <option value="false">غير فعال</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn primary" onclick="saveUser()">حفظ</button>
        <button class="btn" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>
  
  <script>
  const permissions = {
    admin: ["dashboard", "patients", "appointments", "treatments", "payments", "invoices", "users"],
    doctor: ["dashboard", "patients", "appointments", "treatments"],
    receptionist: ["dashboard", "patients", "appointments"],
    accountant: ["dashboard", "payments", "invoices"]
  };

  function getCurrentUser() {
    return JSON.parse(localStorage.getItem("user") || "null");
  }

  function getUserRole() {
    const user = getCurrentUser();
    if (!user) return null;

    if (user.role?.name) return user.role.name.toLowerCase();
    if (typeof user.role === "string") return user.role.toLowerCase();

    return null;
  }

  function canAccess(page) {
    const role = getUserRole();
    if (!role) return false;

    const allowedPages = permissions[role] || [];
    return allowedPages.includes(page);
  }

  function protectPage(page) {
    if (!canAccess(page)) {
      alert("ما عندك صلاحية للدخول إلى هذه الصفحة");
      window.location.href = "dashboard.html";
    }
  }

  function hideNavIfNoAccess(elementId, page) {
    const element = document.getElementById(elementId);
    if (!element) return;

    if (!canAccess(page)) {
      element.style.display = "none";
    }
  }

  function applySidebarPermissions() {
    hideNavIfNoAccess("nav-dashboard", "dashboard");
    hideNavIfNoAccess("nav-patients", "patients");
    hideNavIfNoAccess("nav-appointments", "appointments");
    hideNavIfNoAccess("nav-treatments", "treatments");
    hideNavIfNoAccess("nav-payments", "payments");
    hideNavIfNoAccess("nav-invoices", "invoices");
    hideNavIfNoAccess("nav-users", "users");
  }
</script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "null");
    if (!token || !user) {
      window.location.href = "login.html";
    }
    protectPage("users");

    const apiBase = "https://smilix-backend.onrender.com/api/users";
    let editingUserId = null;
    let allUsers = [];
    let allRoles = [];

    function goToDashboard() {
      window.location.href = "dashboard.html";
    }

    function goToPatients() {
      window.location.href = "patients.html";
    }

    function goToAppointments() {
      window.location.href = "appointments.html";
    }

    function goToInvoices() {
      window.location.href = "invoices.html";
    }

    function goToPayments() {
      window.location.href = "payments.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    function formatDate(dateString) {
      if (!dateString) return "-";
      return new Date(dateString).toLocaleDateString("ar-EG", {
        weekday: "long",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
    }

    async function loadRoles() {
      const res = await fetch("https://smilix-backend.onrender.com/api/roles", {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!res.ok) throw new Error("Failed to load roles");

      allRoles = await res.json();

      const select = document.getElementById("roleId");
      select.innerHTML = `<option value="">اختر الدور</option>`;

      allRoles.forEach((role) => {
        select.innerHTML += `<option value="${role.id}">${role.name}</option>`;
      });
    }

    async function loadUsers() {
      try {
        const res = await fetch(apiBase, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (!res.ok) throw new Error("Failed to load users");

        allUsers = await res.json();

        const search = document.getElementById("searchInput").value.trim().toLowerCase();

        const filteredUsers = allUsers.filter((item) => {
          if (!search) return true;

          return (
            (item.fullName || "").toLowerCase().includes(search) ||
            (item.username || "").toLowerCase().includes(search)
          );
        });

        const tableBody = document.getElementById("usersTableBody");
        const emptyState = document.getElementById("emptyState");

        tableBody.innerHTML = "";

        if (!filteredUsers.length) {
          emptyState.style.display = "block";
          return;
        }

        emptyState.style.display = "none";

        filteredUsers.forEach((item) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${item.fullName || "-"}</td>
            <td>${item.username || "-"}</td>
            <td>${item.role?.name || "-"}</td>
            <td>
              <span class="status-badge ${item.isActive ? "status-active" : "status-inactive"}">
                ${item.isActive ? "فعال" : "غير فعال"}
              </span>
            </td>
            <td>${formatDate(item.createdAt)}</td>
            <td>
              <div class="action-cell">
                <button class="mini-btn edit-btn">تعديل</button>
                <button class="mini-btn delete-btn">حذف</button>
              </div>
            </td>
          `;

          tr.querySelector(".edit-btn").addEventListener("click", () => openEditModal(item));
          tr.querySelector(".delete-btn").addEventListener("click", () => deleteUser(item.id));

          tableBody.appendChild(tr);
        });
      } catch (error) {
        console.error("Load users error:", error);
        alert("تعذر تحميل المستخدمين");
      }
    }

    function openCreateModal() {
      editingUserId = null;
      document.getElementById("modalTitle").textContent = "إضافة مستخدم";
      resetForm();
      document.getElementById("userModal").classList.add("show");
    }

    function openEditModal(item) {
      editingUserId = item.id;
      document.getElementById("modalTitle").textContent = "تعديل مستخدم";

      document.getElementById("fullName").value = item.fullName || "";
      document.getElementById("username").value = item.username || "";
      document.getElementById("password").value = "";
      document.getElementById("roleId").value = item.roleId || "";
      document.getElementById("isActive").value = String(item.isActive);

      document.getElementById("userModal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("userModal").classList.remove("show");
    }

    function resetForm() {
      document.getElementById("fullName").value = "";
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("roleId").value = "";
      document.getElementById("isActive").value = "true";
    }

    async function saveUser() {
      try {
        const payload = {
          fullName: document.getElementById("fullName").value,
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
          roleId: document.getElementById("roleId").value,
          isActive: document.getElementById("isActive").value === "true",
        };

        if (!payload.fullName || !payload.username || !payload.roleId) {
          alert("الاسم الكامل واسم المستخدم والدور مطلوبة");
          return;
        }

        if (!editingUserId && !payload.password) {
          alert("كلمة المرور مطلوبة عند إنشاء مستخدم جديد");
          return;
        }

        const method = editingUserId ? "PUT" : "POST";
        const url = editingUserId ? `${apiBase}/${editingUserId}` : apiBase;

        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message || "Failed to save user");

        closeModal();
        loadUsers();
      } catch (error) {
        console.error("Save user error:", error);
        alert("تعذر حفظ المستخدم");
      }
    }

    async function deleteUser(id) {
      if (user.id === id) {
        alert("لا يمكنك حذف حسابك الحالي");
        return;
      }

      const confirmed = confirm("هل أنت متأكد من حذف المستخدم؟");
      if (!confirmed) return;

      try {
        const res = await fetch(`${apiBase}/${id}`, {
          method: "DELETE",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message || "Failed to delete user");

        loadUsers();
      } catch (error) {
        console.error("Delete user error:", error);
        alert("تعذر حذف المستخدم");
      }
    }

    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadUsers();
    });

    async function initPage() {
      try {
        applySidebarPermissions();
        await loadRoles();
        await loadUsers();
      } catch (error) {
        console.error("Users page init error:", error);
        alert("تعذر تحميل صفحة المستخدمين");
      }
    }
function downloadBackup(){
  window.open("https://smilix-backend.onrender.com/api/backup");
}

async function restoreBackup(){
  const file = document.getElementById("restoreFile").files[0];

  if(!file){
    alert("اختر ملف");
    return;
  }

  alert("ميزة الاسترجاع تحتاج رفع ملف للسيرفر (نضيفها لاحقاً)");
}
    initPage();
  </script>
</body>
</html>

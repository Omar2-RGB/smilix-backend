<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smilix Patients</title>
  <style>
    :root {
      --bg-1: #07121d;
      --bg-2: #0d2233;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.08);
      --text: #eef8ff;
      --muted: #9db6ca;
      --primary: #35a8ff;
      --primary-2: #2ce0c7;
      --danger: #ff7b9c;
      --success: #36d399;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(53,168,255,0.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(44,224,199,0.10), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      gap: 16px;
      padding: 16px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(53,168,255,0.25), rgba(44,224,199,0.14));
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-title {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      height: 52px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 16px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(53,168,255,0.18), rgba(44,224,199,0.12));
      border-color: rgba(53,168,255,0.22);
      transform: translateY(-1px);
    }

    .sidebar-footer {
      margin-top: auto;
    }

    .logout-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--danger), #ff5f7c);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border: none;
      color: white;
      font-weight: 700;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-input {
      flex: 1;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      padding: 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.04);
      color: #dcefff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      color: var(--text);
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .action-cell {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }

    .edit-btn {
      background: #2f86ff;
    }

    .delete-btn {
      background: #ff5f7c;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      background: #102638;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      color: #dcefff;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }

    .field textarea {
      height: 100px;
      resize: vertical;
      padding-top: 12px;
    }

    .modal-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-start;
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    .view-btn {
  background: #36d399;
}
.field select,
select {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  color: white;
  padding: 0 12px;
  outline: none;
  font-size: 14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.field select option,
select option {
  background-color: #102638;
  color: #eef8ff;
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Smilix Logo" />
          </div>
          <div>
            <h1>Smilix</h1>
            <p>منصة إدارة عيادات الأسنان</p>
          </div>
        </div>

        <div class="nav-title">القائمة الرئيسية</div>

      <div class="nav">
  <button id="nav-dashboard" class="nav-btn" onclick="goToDashboard()"><span>لوحة التحكم</span><span>🏠</span></button>
  <button id="nav-patients" class="nav-btn" onclick="goToPatients()"><span>المرضى</span><span>👤</span></button>
  <button id="nav-appointments" class="nav-btn" onclick="goToAppointments()"><span>المواعيد</span><span>📅</span></button>
  <button id="nav-treatments" class="nav-btn" onclick="goToTreatments?.()"><span>العلاجات</span><span>🦷</span></button>
  <button id="nav-invoices" class="nav-btn" onclick="goToInvoices()"><span>الفواتير</span><span>🧾</span></button>
  <button id="nav-payments" class="nav-btn" onclick="goToPayments()"><span>الدفعات</span><span>💳</span></button>
  <button id="nav-users" class="nav-btn" onclick="goToUsers?.()"><span>المستخدمون</span><span>👨‍💼</span></button>
</div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="content">
      <section class="topbar">
        <div>
          <h2>إدارة المرضى</h2>
          <p>عرض، بحث، إضافة، تعديل، وحذف المرضى من النظام.</p>
        </div>

        <div class="actions">
          <button class="btn primary" onclick="openCreateModal()">+ إضافة مريض</button>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="ابحث بالاسم أو الهاتف أو كود المريض"
          />
          <button class="btn" onclick="loadPatients()">بحث</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>الكود</th>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>الجنس</th>
                <th>تاريخ الميلاد</th>
                <th>العنوان</th>
                <th>ملاحظات</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="patientsTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty" style="display:none;">لا يوجد مرضى بعد.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="patientModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">إضافة مريض</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>الاسم الكامل</label>
          <input id="fullName" type="text" />
        </div>

        <div class="field">
          <label>رقم الهاتف</label>
          <input id="phone" type="text" />
        </div>

        <div class="field">
          <label>الجنس</label>
          <select id="gender">
            <option value="">اختر</option>
            <option value="male">ذكر</option>
            <option value="female">أنثى</option>
          </select>
        </div>

        <div class="field">
          <label>تاريخ الميلاد</label>
          <input id="birthDate" type="date" />
        </div>

        <div class="field full">
          <label>العنوان</label>
          <input id="address" type="text" />
        </div>

        <div class="field full">
          <label>ملاحظات</label>
          <textarea id="notes"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn primary" onclick="savePatient()">حفظ</button>
        <button class="btn" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
  const permissions = {
    admin: ["dashboard", "patients", "appointments", "treatments", "payments", "invoices", "users"],
    doctor: ["dashboard", "patients", "appointments", "treatments"],
    receptionist: ["dashboard", "patients", "appointments"],
    accountant: ["dashboard", "payments", "invoices"]
  };

  function getCurrentUser() {
    return JSON.parse(localStorage.getItem("user") || "null");
  }

  function getUserRole() {
    const user = getCurrentUser();
    if (!user) return null;

    if (user.role?.name) return user.role.name.toLowerCase();
    if (typeof user.role === "string") return user.role.toLowerCase();

    return null;
  }

  function canAccess(page) {
    const role = getUserRole();
    if (!role) return false;

    const allowedPages = permissions[role] || [];
    return allowedPages.includes(page);
  }

  function protectPage(page) {
    if (!canAccess(page)) {
      alert("ما عندك صلاحية للدخول إلى هذه الصفحة");
      window.location.href = "dashboard.html";
    }
  }

  function hideNavIfNoAccess(elementId, page) {
    const element = document.getElementById(elementId);
    if (!element) return;

    if (!canAccess(page)) {
      element.style.display = "none";
    }
  }

  function applySidebarPermissions() {
    hideNavIfNoAccess("nav-dashboard", "dashboard");
    hideNavIfNoAccess("nav-patients", "patients");
    hideNavIfNoAccess("nav-appointments", "appointments");
    hideNavIfNoAccess("nav-treatments", "treatments");
    hideNavIfNoAccess("nav-payments", "payments");
    hideNavIfNoAccess("nav-invoices", "invoices");
    hideNavIfNoAccess("nav-users", "users");
  }
</script>

<script>
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "null");

  if (!token || !user) {
    window.location.href = "login.html";
  }
protectPage("patients");
  const apiBase = "https://smilix-backend.onrender.com/api/patients";

  let editingPatientId = null;

  function goToDashboard() {
    window.location.href = "dashboard.html";
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }

  function openCreateModal() {
    editingPatientId = null;
    document.getElementById("modalTitle").textContent = "إضافة مريض";
    resetForm();
    document.getElementById("patientModal").classList.add("show");
  }

  function openEditModal(patient) {
    editingPatientId = patient.id;
    document.getElementById("modalTitle").textContent = "تعديل مريض";

    document.getElementById("fullName").value = patient.fullName || "";
    document.getElementById("phone").value = patient.phone || "";
    document.getElementById("gender").value = patient.gender || "";
    document.getElementById("birthDate").value = patient.birthDate
      ? patient.birthDate.split("T")[0]
      : "";
    document.getElementById("address").value = patient.address || "";
    document.getElementById("notes").value = patient.notes || "";

    document.getElementById("patientModal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("patientModal").classList.remove("show");
  }

  function resetForm() {
    document.getElementById("fullName").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("gender").value = "";
    document.getElementById("birthDate").value = "";
    document.getElementById("address").value = "";
    document.getElementById("notes").value = "";
  }
function formatDate(dateString) {
  if (!dateString) return "-";

  const date = new Date(dateString);

  return date.toLocaleDateString("ar-EG", {
    weekday: "long",   // اسم اليوم
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
  });
}

  function genderLabel(value) {
    if (value === "male") return "ذكر";
    if (value === "female") return "أنثى";
    return "-";
  }

  async function loadPatients() {
    try {
      const search = document.getElementById("searchInput").value.trim();
      const url = search
        ? `${apiBase}?search=${encodeURIComponent(search)}`
        : apiBase;

      const res = await fetch(url, {
        method: "GET",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      });

      if (!res.ok) {
        throw new Error("Failed to load patients");
      }

      const patients = await res.json();
      const tableBody = document.getElementById("patientsTableBody");
      const emptyState = document.getElementById("emptyState");

      tableBody.innerHTML = "";

      if (!patients.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      patients.forEach((patient) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${patient.patientCode || "-"}</td>
          <td>${patient.fullName || "-"}</td>
          <td>${patient.phone || "-"}</td>
          <td>${genderLabel(patient.gender)}</td>
          <td>${formatDate(patient.birthDate)}</td>
          <td>${patient.address || "-"}</td>
          <td>${patient.notes || "-"}</td>
          <td>
          <div class="action-cell">
          <button class="mini-btn view-btn">الملف</button>
          <button class="mini-btn edit-btn">تعديل</button>
          <button class="mini-btn delete-btn">حذف</button>
          </div>
          </td>
        `;
         tr.querySelector(".view-btn").addEventListener("click", () => {
        window.location.href = `patient-details.html?id=${patient.id}`;
         });
        tr.querySelector(".edit-btn").addEventListener("click", () => {
          openEditModal(patient);
        });

        tr.querySelector(".delete-btn").addEventListener("click", () => {
          deletePatient(patient.id);
        });

        tableBody.appendChild(tr);
      });
    } catch (error) {
      console.error("Load patients error:", error);
      alert("تعذر تحميل المرضى");
    }
  }

  async function savePatient() {
    try {
      const payload = {
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        gender: document.getElementById("gender").value,
        birthDate: document.getElementById("birthDate").value || null,
        address: document.getElementById("address").value,
        notes: document.getElementById("notes").value,
      };

      if (!payload.fullName.trim()) {
        alert("الاسم الكامل مطلوب");
        return;
      }

      const method = editingPatientId ? "PUT" : "POST";
      const url = editingPatientId
        ? `${apiBase}/${editingPatientId}`
        : apiBase;

      const res = await fetch(url, {
        method,
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "Failed to save patient");
      }

      closeModal();
      loadPatients();
      localStorage.setItem("refreshDashboard", "true");
    } catch (error) {
      console.error("Save patient error:", error);
      alert("تعذر حفظ بيانات المريض");
    }
  }

  async function deletePatient(id) {
    const confirmed = confirm("هل أنت متأكد من حذف هذا المريض؟");
    if (!confirmed) return;

    try {
      const res = await fetch(`${apiBase}/${id}`, {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "Failed to delete patient");
      }

      loadPatients();
      localStorage.setItem("refreshDashboard", "true");
    } catch (error) {
      console.error("Delete patient error:", error);
      alert("تعذر حذف المريض");
    }
  }

  document.getElementById("searchInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      loadPatients();
    }
  });

  loadPatients();
</script>
</body>
</html>

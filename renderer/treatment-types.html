<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smilix Treatment Types</title>
  <style>
    :root {
      --bg-1: #07121d;
      --bg-2: #0d2233;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.08);
      --text: #eef8ff;
      --muted: #9db6ca;
      --primary: #35a8ff;
      --primary-2: #2ce0c7;
      --danger: #ff7b9c;
      --success: #36d399;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(53,168,255,0.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(44,224,199,0.10), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      gap: 16px;
      padding: 16px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(53,168,255,0.25), rgba(44,224,199,0.14));
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-title {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      height: 52px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 16px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(53,168,255,0.18), rgba(44,224,199,0.12));
      border-color: rgba(53,168,255,0.22);
      transform: translateY(-1px);
    }

    .sidebar-footer {
      margin-top: auto;
    }

    .logout-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--danger), #ff5f7c);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border: none;
      color: white;
      font-weight: 700;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.04);
      color: #dcefff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .color-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      display: inline-block;
    }

    .status-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
    }

    .status-active {
      background: rgba(54,211,153,0.16);
      color: #8ff0c0;
      border: 1px solid rgba(54,211,153,0.2);
    }

    .status-inactive {
      background: rgba(255,123,156,0.16);
      color: #ffb2c4;
      border: 1px solid rgba(255,123,156,0.22);
    }

    .action-cell {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }

    .edit-btn {
      background: #2f86ff;
    }

    .delete-btn {
      background: #ff5f7c;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      background: #102638;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      color: #dcefff;
    }

    .field input,
    .field select {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }

    .field input[type="color"] {
      padding: 4px;
      height: 46px;
      cursor: pointer;
    }

    .modal-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-start;
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    .field select,
select {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  color: white;
  padding: 0 12px;
  outline: none;
  font-size: 14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.field select option,
select option {
  background-color: #102638;
  color: #eef8ff;
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Smilix Logo" />
          </div>
          <div>
            <h1>Smilix</h1>
            <p>منصة إدارة عيادات الأسنان</p>
          </div>
        </div>

        <div class="nav-title">القائمة الرئيسية</div>

       <div class="nav">
  <button id="nav-dashboard" class="nav-btn" onclick="goToDashboard()"><span>لوحة التحكم</span><span>🏠</span></button>
  <button id="nav-patients" class="nav-btn" onclick="goToPatients()"><span>المرضى</span><span>👤</span></button>
  <button id="nav-appointments" class="nav-btn" onclick="goToAppointments()"><span>المواعيد</span><span>📅</span></button>
  <button id="nav-treatments" class="nav-btn" onclick="goToTreatments?.()"><span>العلاجات</span><span>🦷</span></button>
  <button id="nav-invoices" class="nav-btn" onclick="goToInvoices()"><span>الفواتير</span><span>🧾</span></button>
  <button id="nav-payments" class="nav-btn" onclick="goToPayments()"><span>الدفعات</span><span>💳</span></button>
  <button id="nav-users" class="nav-btn" onclick="goToUsers?.()"><span>المستخدمون</span><span>👨‍💼</span></button>
</div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="content">
      <section class="topbar">
        <div>
          <h2>أنواع العلاجات</h2>
          <p>إدارة الاسم، اللون، والسعر الافتراضي لكل علاج.</p>
        </div>

        <div class="actions">
          <button class="btn primary" onclick="openCreateModal()">+ إضافة علاج</button>
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>الاسم</th>
                <th>الاسم الإنجليزي</th>
                <th>نوع العمل</th>
                <th>السعر الافتراضي</th>
                <th>اللون</th>
                <th>الترتيب</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="typesTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty" style="display:none;">لا توجد أنواع علاجات بعد.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="typeModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">إضافة نوع علاج</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>اسم العلاج</label>
          <input id="name" type="text" />
        </div>

        <div class="field">
          <label>الاسم الإنجليزي</label>
          <input id="engName" type="text" />
        </div>

        <div class="field">
          <label>نوع العمل</label>
          <input id="workType" type="text" />
        </div>

        <div class="field">
          <label>السعر الافتراضي</label>
          <input id="defaultPrice" type="number" step="0.01" />
        </div>

        <div class="field">
          <label>اللون</label>
          <input id="colorHex" type="color" value="#35a8ff" />
        </div>

        <div class="field">
          <label>الترتيب</label>
          <input id="sortOrder" type="number" value="0" />
        </div>

        <div class="field full">
          <label>الحالة</label>
          <select id="isActive">
            <option value="true">فعال</option>
            <option value="false">غير فعال</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn primary" onclick="saveType()">حفظ</button>
        <button class="btn" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>
<script>
  const permissions = {
    admin: ["dashboard", "patients", "appointments", "treatments", "payments", "invoices", "users"],
    doctor: ["dashboard", "patients", "appointments", "treatments"],
    receptionist: ["dashboard", "patients", "appointments"],
    accountant: ["dashboard", "payments", "invoices"]
  };

  function getCurrentUser() {
    return JSON.parse(localStorage.getItem("user") || "null");
  }

  function getUserRole() {
    const user = getCurrentUser();
    if (!user) return null;

    if (user.role?.name) return user.role.name.toLowerCase();
    if (typeof user.role === "string") return user.role.toLowerCase();

    return null;
  }

  function canAccess(page) {
    const role = getUserRole();
    if (!role) return false;

    const allowedPages = permissions[role] || [];
    return allowedPages.includes(page);
  }

  function protectPage(page) {
    if (!canAccess(page)) {
      alert("ما عندك صلاحية للدخول إلى هذه الصفحة");
      window.location.href = "dashboard.html";
    }
  }

  function hideNavIfNoAccess(elementId, page) {
    const element = document.getElementById(elementId);
    if (!element) return;

    if (!canAccess(page)) {
      element.style.display = "none";
    }
  }

  function applySidebarPermissions() {
    hideNavIfNoAccess("nav-dashboard", "dashboard");
    hideNavIfNoAccess("nav-patients", "patients");
    hideNavIfNoAccess("nav-appointments", "appointments");
    hideNavIfNoAccess("nav-treatments", "treatments");
    hideNavIfNoAccess("nav-payments", "payments");
    hideNavIfNoAccess("nav-invoices", "invoices");
    hideNavIfNoAccess("nav-users", "users");
  }
</script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "null");

    if (!token || !user) {
      window.location.href = "login.html";
    }

    const apiBase = "https://smilix-backend.onrender.com/api/treatment-types";
    let editingTypeId = null;

    function goToDashboard() {
      window.location.href = "dashboard.html";
    }

    function goToPatients() {
      window.location.href = "patients.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    function openCreateModal() {
      editingTypeId = null;
      document.getElementById("modalTitle").textContent = "إضافة نوع علاج";
      resetForm();
      document.getElementById("typeModal").classList.add("show");
    }

    function openEditModal(item) {
      editingTypeId = item.id;
      document.getElementById("modalTitle").textContent = "تعديل نوع علاج";

      document.getElementById("name").value = item.name || "";
      document.getElementById("engName").value = item.engName || "";
      document.getElementById("workType").value = item.workType || "";
      document.getElementById("defaultPrice").value = item.defaultPrice || 0;
      document.getElementById("colorHex").value = item.colorHex || "#35a8ff";
      document.getElementById("sortOrder").value = item.sortOrder || 0;
      document.getElementById("isActive").value = String(item.isActive);

      document.getElementById("typeModal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("typeModal").classList.remove("show");
    }

    function resetForm() {
      document.getElementById("name").value = "";
      document.getElementById("engName").value = "";
      document.getElementById("workType").value = "";
      document.getElementById("defaultPrice").value = 0;
      document.getElementById("colorHex").value = "#35a8ff";
      document.getElementById("sortOrder").value = 0;
      document.getElementById("isActive").value = "true";
    }

    async function loadTypes() {
      try {
        const res = await fetch(apiBase, {
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          }
        });

        if (!res.ok) throw new Error("Failed to load treatment types");

        const items = await res.json();
        const tableBody = document.getElementById("typesTableBody");
        const emptyState = document.getElementById("emptyState");

        tableBody.innerHTML = "";

        if (!items.length) {
          emptyState.style.display = "block";
          return;
        }

        emptyState.style.display = "none";

        items.forEach((item) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${item.name || "-"}</td>
            <td>${item.engName || "-"}</td>
            <td>${item.workType || "-"}</td>
            <td>${item.defaultPrice ?? 0}</td>
            <td><span class="color-badge" style="background:${item.colorHex || "#35a8ff"};"></span></td>
            <td>${item.sortOrder ?? 0}</td>
            <td>
              <span class="status-badge ${item.isActive ? "status-active" : "status-inactive"}">
                ${item.isActive ? "فعال" : "غير فعال"}
              </span>
            </td>
            <td>
              <div class="action-cell">
                <button class="mini-btn edit-btn">تعديل</button>
                <button class="mini-btn delete-btn">حذف</button>
              </div>
            </td>
          `;

          tr.querySelector(".edit-btn").addEventListener("click", () => {
            openEditModal(item);
          });

          tr.querySelector(".delete-btn").addEventListener("click", () => {
            deleteType(item.id);
          });

          tableBody.appendChild(tr);
        });
      } catch (error) {
        console.error("Load treatment types error:", error);
        alert("تعذر تحميل أنواع العلاجات");
      }
    }

    async function saveType() {
      try {
        const payload = {
          name: document.getElementById("name").value,
          engName: document.getElementById("engName").value,
          workType: document.getElementById("workType").value,
          defaultPrice: document.getElementById("defaultPrice").value,
          colorHex: document.getElementById("colorHex").value,
          sortOrder: document.getElementById("sortOrder").value,
          isActive: document.getElementById("isActive").value === "true",
        };

        if (!payload.name.trim()) {
          alert("اسم العلاج مطلوب");
          return;
        }

        const method = editingTypeId ? "PUT" : "POST";
        const url = editingTypeId ? `${apiBase}/${editingTypeId}` : apiBase;

        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to save treatment type");
        }

        closeModal();
        loadTypes();
      } catch (error) {
        console.error("Save treatment type error:", error);
        alert("تعذر حفظ نوع العلاج");
      }
    }

    async function deleteType(id) {
      const confirmed = confirm("هل أنت متأكد من حذف نوع العلاج؟");
      if (!confirmed) return;

      try {
        const res = await fetch(`${apiBase}/${id}`, {
          method: "DELETE",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to delete treatment type");
        }

        loadTypes();
      } catch (error) {
        console.error("Delete treatment type error:", error);
        alert("تعذر حذف نوع العلاج");
      }
    }

    loadTypes();
  </script>
</body>
</html>

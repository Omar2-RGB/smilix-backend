<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الموردين - Smilix</title>
  <style>
    :root {
      --bg-1: #07121d;
      --bg-2: #0d2233;
      --panel: rgba(255,255,255,0.05);
      --line: rgba(255,255,255,0.08);
      --text: #eef8ff;
      --muted: #9db6ca;
      --primary: #35a8ff;
      --primary-2: #2ce0c7;
      --danger: #ff5f7c;
      --warning: #ffb84d;
      --shadow: 0 20px 50px rgba(0,0,0,0.30);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(53,168,255,0.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(44,224,199,0.10), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(53,168,255,0.25), rgba(44,224,199,0.14));
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-title {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      height: 52px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 16px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(53,168,255,0.18), rgba(44,224,199,0.12));
      border-color: rgba(53,168,255,0.22);
      transform: translateY(-1px);
    }

    .sidebar-footer {
      margin-top: auto;
    }

    .logout-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--danger), #ff5f7c);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border: none;
      color: white;
      font-weight: 700;
    }

    .btn.delete {
      background: linear-gradient(135deg, var(--danger), #ff6f8c);
      border: none;
      color: white;
      font-weight: 700;
      height: 36px;
      padding: 0 14px;
      border-radius: 10px;
    }

    .btn.edit {
      background: linear-gradient(135deg, #2f86ff, #55b5ff);
      border: none;
      color: white;
      font-weight: 700;
      height: 36px;
      padding: 0 14px;
      border-radius: 10px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .search-input,
    .field input,
    .field textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: white;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .search-input {
      height: 48px;
    }

    .field input {
      height: 44px;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
      padding-top: 12px;
    }

    .search-input::placeholder,
    .field input::placeholder,
    .field textarea::placeholder {
      color: #9db6ca;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: rgba(255,255,255,0.04);
      color: #dcefff;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    .note-cell {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-cell {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      background: rgba(16, 38, 56, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      backdrop-filter: blur(20px);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      color: #dcefff;
    }

    .modal-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-start;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .stats-row {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    .field select,
select {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  color: white;
  padding: 0 12px;
  outline: none;
  font-size: 14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.field select option,
select option {
  background-color: #102638;
  color: #eef8ff;
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Smilix Logo" />
          </div>
          <div>
            <h1>Smilix</h1>
            <p>منصة إدارة عيادات الأسنان</p>
          </div>
        </div>

        <div class="nav-title">القائمة الرئيسية</div>
        <div class="nav">
          <button class="nav-btn" onclick="goDashboard()"><span>لوحة التحكم</span><span>🏠</span></button>
          <button class="nav-btn" onclick="goPatients()"><span>المرضى</span><span>👤</span></button>
          <button class="nav-btn" onclick="goAppointments()"><span>المواعيد</span><span>📅</span></button>
          <button class="nav-btn" onclick="goLab()"><span>المخبر</span><span>🧪</span></button>
          <button class="nav-btn active" onclick="goSuppliers()"><span>الموردين</span><span>🏭</span></button>
          <button class="nav-btn" onclick="goExpenses()"><span>المصاريف</span><span>💸</span></button>
          <button class="nav-btn" onclick="goPayments()"><span>الدفعات</span><span>💳</span></button>
          <button class="nav-btn" onclick="goInvoices()"><span>الفواتير</span><span>🧾</span></button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="content">
      <section class="topbar">
        <div>
          <h2>🏭 الموردين</h2>
          <p>إدارة الموردين وبيانات التواصل معهم.</p>
        </div>

        <div class="actions">
          <button class="btn primary" onclick="openModal()">+ إضافة مورد</button>
        </div>
      </section>

      <section class="panel">
        <div class="stats-row">
          <div class="stat-card">
            <div class="label">عدد الموردين</div>
            <div class="value" id="suppliersCountValue">0</div>
          </div>
          <div class="stat-card">
            <div class="label">مع أرقام هاتف</div>
            <div class="value" id="suppliersPhonesValue">0</div>
          </div>
          <div class="stat-card">
            <div class="label">مع شركات</div>
            <div class="value" id="suppliersCompaniesValue">0</div>
          </div>
        </div>

        <div class="toolbar">
          <input id="searchInput" class="search-input" type="text" placeholder="ابحث باسم المورد أو الهاتف أو الشركة" />
          <button class="btn" onclick="loadSuppliers()">بحث</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>الشركة</th>
                <th>العنوان</th>
                <th>ملاحظات</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="suppliersTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty" style="display:none;">لا يوجد موردين بعد.</div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">إضافة مورد</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="form-grid">
        <div class="field full">
          <label>اسم المورد</label>
          <input id="name" type="text" placeholder="اسم المورد" />
        </div>

        <div class="field">
          <label>الهاتف</label>
          <input id="phone" type="text" placeholder="رقم الهاتف" />
        </div>

        <div class="field">
          <label>الشركة</label>
          <input id="company" type="text" placeholder="اسم الشركة" />
        </div>

        <div class="field full">
          <label>العنوان</label>
          <input id="address" type="text" placeholder="العنوان" />
        </div>

        <div class="field full">
          <label>ملاحظات</label>
          <textarea id="notes" placeholder="أي ملاحظات إضافية"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn primary" onclick="saveSupplier()">حفظ</button>
        <button class="btn" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:5000/api/suppliers";
    let editingSupplierId = null;

    function goDashboard() { window.location.href = "dashboard.html"; }
    function goPatients() { window.location.href = "patients.html"; }
    function goAppointments() { window.location.href = "appointments.html"; }
    function goLab() { window.location.href = "lab.html"; }
    function goSuppliers() { window.location.href = "suppliers.html"; }
    function goExpenses() { window.location.href = "expenses.html"; }
    function goPayments() { window.location.href = "payments.html"; }
    function goInvoices() { window.location.href = "invoices.html"; }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    function openModal() {
      editingSupplierId = null;
      document.getElementById("modalTitle").textContent = "إضافة مورد";
      document.getElementById("modal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("show");
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("company").value = "";
      document.getElementById("address").value = "";
      document.getElementById("notes").value = "";
    }

    async function loadSuppliers() {
      const search = document.getElementById("searchInput").value.trim();
      const query = search ? `?search=${encodeURIComponent(search)}` : "";

      const res = await fetch(API + query);
      const data = await res.json();

      const body = document.getElementById("suppliersTableBody");
      const emptyState = document.getElementById("emptyState");
      body.innerHTML = "";

      let count = 0;
      let phonesCount = 0;
      let companiesCount = 0;

      if (!data.length) {
        emptyState.style.display = "block";
      } else {
        emptyState.style.display = "none";
      }

      data.forEach((item) => {
        count += 1;
        if (item.phone) phonesCount += 1;
        if (item.company) companiesCount += 1;

        body.innerHTML += `
          <tr>
            <td>${item.name || "-"}</td>
            <td>${item.phone || "-"}</td>
            <td>${item.company || "-"}</td>
            <td>${item.address || "-"}</td>
            <td class="note-cell" title="${item.notes || "-"}">${item.notes || "-"}</td>
            <td>
           <div class="action-cell">
           <button class="btn edit" onclick='editSupplier(${JSON.stringify(item)})'>تعديل</button>
           <button class="btn" onclick="openSupplierPurchases(${item.id})">المشتريات</button>
           <button class="btn delete" onclick="deleteSupplier(${item.id})">حذف</button>
           </div>
           </td>
          </tr>
        `;
      });

      document.getElementById("suppliersCountValue").textContent = count;
      document.getElementById("suppliersPhonesValue").textContent = phonesCount;
      document.getElementById("suppliersCompaniesValue").textContent = companiesCount;
    }

    function editSupplier(item) {
      editingSupplierId = item.id;
      document.getElementById("modalTitle").textContent = "تعديل مورد";
      document.getElementById("name").value = item.name || "";
      document.getElementById("phone").value = item.phone || "";
      document.getElementById("company").value = item.company || "";
      document.getElementById("address").value = item.address || "";
      document.getElementById("notes").value = item.notes || "";
      document.getElementById("modal").classList.add("show");
    }

    async function saveSupplier() {
      const payload = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        company: document.getElementById("company").value.trim(),
        address: document.getElementById("address").value.trim(),
        notes: document.getElementById("notes").value.trim()
      };

      if (!payload.name) {
        alert("اسم المورد مطلوب");
        return;
      }

      const method = editingSupplierId ? "PUT" : "POST";
      const url = editingSupplierId ? `${API}/${editingSupplierId}` : API;

      await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      closeModal();
      loadSuppliers();
    }

    async function deleteSupplier(id) {
      const confirmed = confirm("هل أنت متأكد من حذف المورد؟");
      if (!confirmed) return;

      await fetch(`${API}/${id}`, { method: "DELETE" });
      loadSuppliers();
    }
function openSupplierPurchases(id) {
  window.location.href = `supplier-purchases.html?supplierId=${id}`;
}
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadSuppliers();
    });

    loadSuppliers();
  </script>
</body>
</html>

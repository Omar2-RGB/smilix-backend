<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إدارة الأوقات المتاحة</title>

  <style>
    body {
      font-family: "Segoe UI", Tahoma;
      background: #0d2233;
      color: white;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: #35a8ff;
      color: white;
      cursor: pointer;
    }

    .slot {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
    }
    .slot-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.2s;
}

.slot-card:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.08);
}

.slot-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.date {
  font-size: 14px;
  color: #9db6ca;
}

.time {
  font-size: 18px;
  font-weight: bold;
}

.status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
  width: fit-content;
}

.status.available {
  background: rgba(54,211,153,0.2);
  color: #36d399;
}

.status.booked {
  background: rgba(255,123,156,0.2);
  color: #ff7b9c;
}

.delete-btn {
  background: #ff5f7c;
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
}

.delete-btn:hover {
  opacity: 0.8;
}
.field select,
select {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  color: white;
  padding: 0 12px;
  outline: none;
  font-size: 14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.field select option,
select option {
  background-color: #102638;
  color: #eef8ff;
}
  </style>
</head>

<body>

  <h2>📅 إدارة الأوقات المتاحة</h2>

  <!-- إضافة وقت -->
  <div class="form">
    <input type="date" id="date" />
    <input type="time" id="startTime" />
    <input type="time" id="endTime" />

    <button onclick="addSlot()">➕ إضافة</button>
    <button class="btn" onclick="goBack()">رجوع</button>
  </div>

  <!-- عرض الأوقات -->
  <div id="slotsList"></div>

  <script>
    const API = "https://smilix-backend.onrender.com/api/slots";

    async function loadSlots() {
      const res = await fetch(API);
      const data = await res.json();

      const list = document.getElementById("slotsList");
      list.innerHTML = "";

      data.forEach(slot => {
       list.innerHTML += `
  <div class="slot-card">
    
    <div class="slot-info">
      <div class="date">
        📅 ${slot.date.split("T")[0]}
      </div>

      <div class="time">
        ⏰ ${formatTime(slot.startTime)} - ${formatTime(slot.endTime)}
      </div>

      <div class="status ${slot.status}">
        ${slot.status === "available" ? "متاح" : "محجوز"}
      </div>
    </div>

    <button class="delete-btn" onclick="deleteSlot(${slot.id})">
      حذف
    </button>

  </div>
`;
      });
    }
function formatTime(time) {
  const [hour, minute] = time.split(":");
  let h = parseInt(hour);
  const ampm = h >= 12 ? "م" : "ص";

  h = h % 12;
  if (h === 0) h = 12;

  return `${h}:${minute} ${ampm}`;
}
    async function addSlot() {
  const date = document.getElementById("date").value;
  const startTime = document.getElementById("startTime").value;
  const endTime = document.getElementById("endTime").value;

  const data = {
    date,
    startTime,
    endTime
  };

  const res = await fetch("https://smilix-backend.onrender.com/api/slots", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (!res.ok) {
    alert(result.message);
    return;
  }

  alert("تمت الإضافة ✅");

      loadSlots();
    }
    function goBack() {
        window.history.back();
    }
    async function deleteSlot(id) {
      await fetch(`${API}/${id}`, {
        method: "DELETE"
      });

      loadSlots();
    }

    loadSlots();
  </script>

</body>
</html>
